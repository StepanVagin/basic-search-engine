services:
  cluster-master:
    image: firasj/spark-docker-cluster
    container_name: cluster-master
    mem_limit: 4g
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - "./app:/app"
    networks:
      - spark-cluster
    depends_on:
      cluster-slave-1:
        condition: service_healthy
      cassandra-server:
        condition: service_healthy
    hostname: cluster-master
    tty: true
    working_dir: /app
    entrypoint:
      - bash
      - /app/app.sh

  cluster-slave-1:
    image: firasj/spark-docker-cluster
    container_name: cluster-slave-1
    mem_limit: 1g
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true
    entrypoint:
      - bash
      - -c
      - "service ssh restart && tail -f /dev/null"
    healthcheck:
      test: ["CMD", "bash", "-c", "service ssh status | grep -q running"]
      interval: 5s
      timeout: 5s
      retries: 10

  cassandra-server:
    image: cassandra
    container_name: cassandra-server
    mem_limit: 2g
    environment:
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    ports:
      # 7000 conflicts with macOS AirPlay Receiver; CQL is enough for host access
      - "9042:9042"
    networks:
      - spark-cluster
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

networks:
  spark-cluster:
    driver: bridge